on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3
        with:
          extra-conf: |
            accept-flake-config = true
            log-lines = 200
      - run: nix flake check --show-trace
